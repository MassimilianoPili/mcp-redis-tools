name: Auto-publish to Gitea Registry
on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitea/**"
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
      - name: Install Maven
        run: |
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz | tar xz -C /opt
          echo "/opt/apache-maven-3.9.9/bin" >> $GITHUB_PATH
      - name: Delete existing package version
        continue-on-error: true
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          ARTIFACT=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          GROUP=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          PKG_NAME=$(echo "${GROUP}:${ARTIFACT}" | sed 's/:/%3A/g')
          echo "Deleting ${GROUP}:${ARTIFACT}:${VERSION} from Gitea registry..."
          curl -s -o /dev/null -w "HTTP %{http_code}\n" -X DELETE \
            -H "Authorization: token ${{ secrets.MAVEN_REGISTRY_TOKEN }}" \
            "http://gitea:3000/api/v1/packages/sol_root/maven/${PKG_NAME}/${VERSION}"
      - name: Configure Maven settings
        run: |
          cat > ~/.m2/settings.xml << 'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>gitea</id>
                <username>${env.MAVEN_USERNAME}</username>
                <password>${env.MAVEN_PASSWORD}</password>
              </server>
              <server>
                <id>central</id>
                <username>dummy</username>
                <password>dummy</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>maven-default-http-blocker</id>
                <mirrorOf>!gitea,external:http:*</mirrorOf>
                <url>http://0.0.0.0/</url>
                <blocked>true</blocked>
              </mirror>
            </mirrors>
          </settings>
          SETTINGS
      - name: Deploy to Gitea Registry
        run: mvn deploy -DskipTests -Dcentral-publishing.skip=true -Dgpg.skip=true
        env:
          MAVEN_USERNAME: sol_root
          MAVEN_PASSWORD: ${{ secrets.MAVEN_REGISTRY_TOKEN }}
